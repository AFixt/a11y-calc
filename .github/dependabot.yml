version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
      vite:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
    groups:
      actions:
        patterns:
          - "*"
