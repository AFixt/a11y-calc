name: Accessibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  component:
    name: Component-level (vitest + a11y-assert)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npx vitest run src/__tests__/a11y.test.tsx

  e2e:
    name: E2E (playwright + a11y-assert)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run build:demo

      - name: Run a11y E2E
        run: npx playwright test e2e/a11y.spec.ts --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-a11y
          path: playwright-report/
          if-no-files-found: ignore
